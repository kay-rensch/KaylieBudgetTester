<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Kaylie's Monthly Budget Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    body { margin: 0; padding: 1.5rem; background: #f5f5f7; color: #111827; }

    h1 { margin-bottom: 0.25rem; }
    h2 { margin-top: 1.5rem; margin-bottom: 0.5rem; }

    .container {
      max-width: 900px;
      margin: 0 auto;
      background: #ffffff;
      padding: 1.5rem;
      border-radius: 0.75rem;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .row > div {
      flex: 1 1 200px;
    }

    label {
      display: block;
      font-size: 0.85rem;
      margin-bottom: 0.25rem;
      color: #4b5563;
    }

    input, select {
      width: 100%;
      padding: 0.6rem;
      border-radius: 0.5rem;
      border: 1px solid #d1d5db;
      font-size: 0.95rem;
    }

    button {
      border: none;
      border-radius: 0.5rem;
      padding: 0.7rem 1rem;
      font-size: 0.95rem;
      cursor: pointer;
    }

    .btn-primary { background: #2563eb; color: #ffffff; }
    .btn-secondary { background: #e5e7eb; color: #111827; }
    .btn-danger { background: #ef4444; color: #ffffff; }

    .summary {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin: 1rem 0;
    }

    .card {
      flex: 1 1 150px;
      background: #f9fafb;
      border-radius: 0.75rem;
      padding: 0.75rem 1rem;
      border: 1px solid #e5e7eb;
    }

    .card-title {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #6b7280;
      margin-bottom: 0.25rem;
    }

    .card-value { font-size: 1.1rem; font-weight: 600; }

    .card.good { background: #ecfdf3; border-color: #22c55e33; }
    .card.bad { background: #fef2f2; border-color: #ef444433; }

    .category-pill {
      display: inline-block;
      padding: 0.25rem 0.6rem;
      border-radius: 999px;
      font-size: 0.8rem;
      background: #e5e7eb;
      color: #374151;
    }

    /* Confetti */
    .confetti {
      position: fixed;
      top: -20px;
      width: 10px;
      height: 16px;
      background-color: hsl(var(--hue), 80%, 60%);
      opacity: 0.95;
      transform: translateZ(0) rotate(15deg);
      animation: fall 2.2s linear forwards;
      z-index: 999999;
      will-change: transform;
    }

    @keyframes fall {
      0% { transform: translateY(0) rotate(0deg); }
      100% { transform: translateY(110vh) rotate(360deg); opacity: 0.2; }
    }

    /* FULL-WIDTH STACKED CARDS ALWAYS */
    .entry-grid {
      display: block !important;
    }

    .entry-card {
      background: #fff;
      padding: 1rem;
      border-radius: 0.6rem;
      box-shadow: 0 2px 6px rgba(0,0,0,0.06);
      margin-bottom: 0.75rem;
    }

    .entry-card div {
      margin-bottom: 0.35rem;
      font-size: 0.95rem;
    }

    .entry-card div span {
      font-weight: 600;
      color: #111;
    }

    .entry-card button {
      width: 100%;
      margin-top: 0.5rem;
    }

    /* iPhone form spacing */
    @media (max-width: 600px) {
      body { padding: 1rem; }
      .container { padding: 1rem; }

      .row {
        display: flex;
        flex-direction: column;
        gap: 0.35rem;
        margin-bottom: 1rem;
      }

      input, select {
        padding: 0.7rem;
        font-size: 1rem;
      }

      button {
        width: 100%;
        margin-top: 0.4rem;
      }
    }

    /* DARK MODE */
    @media (prefers-color-scheme: dark) {

      body {
        background: #0d0d0f;
        color: #e5e5e7;
      }

      .container {
        background: #1a1a1d;
        box-shadow: none;
        border: 1px solid #2a2a2d;
      }

      input, select {
        background: #2a2a2d;
        color: #f5f5f7;
        border: 1px solid #3a3a3d;
      }

      label {
        color: #c5c5c7;
      }

      .btn-primary {
        background: #3b82f6;
        color: white;
      }

      .btn-secondary {
        background: #3a3a3d;
        color: #e5e5e7;
      }

      .btn-danger {
        background: #ef4444;
        color: white;
      }

      .card {
        background: #2a2a2d;
        border-color: #3a3a3d;
      }

      .card-title {
        color: #b5b5b7;
      }

      .card-value {
        color: #f5f5f7;
      }

      .entry-card {
        background: #2a2a2d;
        border-color: #3a3a3d;
        box-shadow: none;
      }

      .entry-card div span {
        color: #f5f5f7;
      }

      .category-pill {
        background: #3a3a3d;
        color: #e5e5e7;
      }
    }
  </style>
</head>

<body>
  <div class="container">

    <h1>Kaylie's Monthly Budget</h1>

    <div class="summary">
      <div class="card">
        <div class="card-title">Total Income</div>
        <div class="card-value" id="plannedIncome">$0.00</div>
      </div>
      <div class="card">
        <div class="card-title">Total Spent</div>
        <div class="card-value" id="totalSpent">$0.00</div>
      </div>
      <div class="card" id="remainingCard">
        <div class="card-title">Remaining</div>
        <div class="card-value" id="remainingAmount">$0.00</div>
      </div>
    </div>

    <label for="monthSelect">Month</label>
    <input type="month" id="monthSelect" />

    <h2>Add Income</h2>
    <div class="row">
      <div>
        <label>Name</label>
        <input type="text" id="incomeName" placeholder="Paycheck, Bonus..." />
      </div>
      <div>
        <label>Amount</label>
        <input type="number" id="incomeAmount" min="0" step="0.01" />
      </div>
      <div>
        <label>&nbsp;</label>
        <button class="btn-primary" id="addIncomeBtn">Add income</button>
      </div>
    </div>

    <h2>Add Expense</h2>
    <div class="row">
      <div>
        <label>Name</label>
        <input type="text" id="expenseName" />
      </div>
      <div>
        <label>Category</label>
        <select id="expenseCategory">
          <option value="Food">Food</option>
          <option value="Entertainment">Entertainment</option>
          <option value="Transportation">Transportation</option>
          <option value="Personal Care">Personal Care</option>
          <option value="Other">Other</option>
        </select>
      </div>
      <div>
        <label>Amount</label>
        <input type="number" id="expenseAmount" min="0" step="0.01" />
      </div>
      <div>
        <label>&nbsp;</label>
        <button class="btn-primary" id="addExpenseBtn">Add expense</button>
      </div>
    </div>

    <h2>Income Entries</h2>
    <div id="incomeGrid" class="entry-grid"></div>

    <h2>Expenses</h2>
    <button class="btn-secondary" id="clearMonthBtn">Clear this month</button>
    <div id="expenseGrid" class="entry-grid"></div>

  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
