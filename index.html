<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Kaylie's Monthly Budget Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * { box-sizing: border-box; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    body { margin: 0; padding: 1.5rem; background: #f5f5f7; color: #111827; }

    /* Centered title */
    h1 {
      margin-bottom: 0.25rem;
      text-align: center;
      font-size: 1.8rem;
      font-weight: 700;
    }

    .small {
      text-align: center;
      font-size: 0.85rem;
      color: #6b7280;
      margin-bottom: 1rem;
    }

    h2 { margin-top: 1.5rem; margin-bottom: 0.5rem; }

    .container {
      max-width: 900px;
      margin: 0 auto;
      background: #ffffff;
      padding: 1.5rem;
      border-radius: 0.75rem;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
    }

    .row { display: flex; flex-wrap: wrap; gap: 1rem; margin-bottom: 1rem; }
    .row > div { flex: 1 1 200px; }

    label { display: block; font-size: 0.85rem; margin-bottom: 0.25rem; color: #4b5563; }

    input, select {
      width: 100%;
      padding: 0.5rem 0.6rem;
      border-radius: 0.5rem;
      border: 1px solid #d1d5db;
      font-size: 0.95rem;
    }

    /* Longer month selector */
    #monthSelect {
      width: 200px;
      padding: 0.6rem;
      font-size: 1rem;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 1px #2563eb33;
    }

    button {
      border: none;
      border-radius: 0.5rem;
      padding: 0.55rem 1rem;
      font-size: 0.95rem;
      cursor: pointer;
    }

    .btn-primary { background: #2563eb; color: #ffffff; }
    .btn-secondary { background: #e5e7eb; color: #111827; }
    .btn-danger { background: #ef4444; color: #ffffff; }

    .summary {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin: 1rem 0;
    }

    .card {
      flex: 1 1 150px;
      background: #f9fafb;
      border-radius: 0.75rem;
      padding: 0.75rem 1rem;
      border: 1px solid #e5e7eb;
    }

    .card-title {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #6b7280;
      margin-bottom: 0.25rem;
    }

    .card-value {
      font-size: 1.1rem;
      font-weight: 600;
    }

    .card.good { border-color: #22c55e33; background: #ecfdf3; }
    .card.bad { border-color: #ef444433; background: #fef2f2; }

    table { width: 100%; border-collapse: collapse; margin-top: 0.5rem; }
    th, td { padding: 0.5rem; font-size: 0.9rem; border-bottom: 1px solid #e5e7eb; text-align: left; }
    th { background: #f3f4f6; font-weight: 600; }
    tr:nth-child(even) td { background: #f9fafb; }
    .right { text-align: right; }

    .category-pill {
      display: inline-block;
      padding: 0.15rem 0.5rem;
      border-radius: 999px;
      font-size: 0.75rem;
      background: #e5e7eb;
      color: #374151;
    }

    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 1rem;
      flex-wrap: wrap;
    }

    /* MONEY RAIN */
    .money-rain {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
      z-index: 9999;
    }

    .money {
      position: absolute;
      font-size: 2rem;
      animation: fall 1.5s linear forwards;
    }

    @keyframes fall {
      from { transform: translateY(-50px) rotate(0deg); opacity: 1; }
      to { transform: translateY(120vh) rotate(360deg); opacity: 0; }
    }
  </style>
</head>
<body>

  <div class="container">

    <h1>Kaylie's Monthly Budget</h1>
    <div class="small">Data is autosaved</div>

    <div class="header-row" style="justify-content:center;">
      <div>
        <label for="monthSelect">Month</label>
        <input type="month" id="monthSelect" />
      </div>
    </div>

    <div class="summary">
      <div class="card">
        <div class="card-title">Total Income</div>
        <div class="card-value" id="plannedIncome">$0.00</div>
      </div>
      <div class="card">
        <div class="card-title">Total Spent</div>
        <div class="card-value" id="totalSpent">$0.00</div>
      </div>
      <div class="card" id="remainingCard">
        <div class="card-title">Remaining</div>
        <div class="card-value" id="remainingAmount">$0.00</div>
      </div>
    </div>

    <h2>Add Income</h2>
    <div class="row">
      <div>
        <label for="incomeName">Name</label>
        <input type="text" id="incomeName" placeholder="Paycheck, Bonus..." />
      </div>
      <div>
        <label for="incomeAmount">Amount</label>
        <input type="number" id="incomeAmount" min="0" step="0.01" placeholder="e.g. 1500.00" />
      </div>
      <div>
        <label>&nbsp;</label>
        <button class="btn-primary" id="addIncomeBtn">Add income</button>
      </div>
    </div>

    <h2>Add Expense</h2>
    <div class="row">
      <div>
        <label for="expenseName">Name</label>
        <input type="text" id="expenseName" placeholder="Groceries, Rent, Uber..." />
      </div>
      <div>
        <label for="expenseCategory">Category</label>
        <select id="expenseCategory">
          <option value="Food">Food</option>
          <option value="Entertainment">Entertainment</option>
          <option value="Transportation">Transportation</option>
          <option value="Personal Care">Personal Care</option>
          <option value="Other">Other</option>
        </select>
      </div>
      <div>
        <label for="expenseAmount">Amount</label>
        <input type="number" id="expenseAmount" min="0" step="0.01" placeholder="e.g. 45.90" />
      </div>
      <div>
        <label>&nbsp;</label>
        <button class="btn-primary" id="addExpenseBtn">Add expense</button>
      </div>
    </div>

    <div class="header-row">
      <h2>Income Entries</h2>
    </div>

    <table>
      <thead>
        <tr>
          <th>Date</th>
          <th>Name</th>
          <th class="right">Amount</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="incomeTableBody"></tbody>
    </table>

    <div class="header-row">
      <h2>Expenses</h2>
      <button class="btn-secondary" id="clearMonthBtn">Clear this month</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>Date</th>
          <th>Name</th>
          <th>Category</th>
          <th class="right">Amount</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="expenseTableBody"></tbody>
    </table>

  </div>

  <div id="moneyRain" class="money-rain"></div>

  <script type="module" src="app.js"></script>
</body>
</html>
