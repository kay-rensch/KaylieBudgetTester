<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Kaylie's Budget</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * { box-sizing: border-box; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    body { margin: 0; padding: 1.5rem; background: #f5f5f7; color: #111827; }

    h1 {
      text-align: center;
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
    }

    .month-title {
      text-align: center;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #6b7280;
      margin-top: 1rem;
      margin-bottom: 0.25rem;
    }

    .section-spaced {
      margin-top: 2rem;
      margin-bottom: 1.5rem;
    }

    /* NEW: move buttons down slightly */
    .move-down {
      margin-top: 0.6rem;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      background: #ffffff;
      padding: 1.5rem;
      border-radius: 0.75rem;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
    }

    input, select {
      width: 100%;
      padding: 0.6rem;
      border-radius: 0.5rem;
      border: 1px solid #d1d5db;
      font-size: 1rem;
    }

    #monthSelect {
      width: 260px;
      margin: 0 auto;
      display: block;
    }

    button {
      border: none;
      border-radius: 0.5rem;
      padding: 0.55rem 1rem;
      font-size: 0.95rem;
      cursor: pointer;
    }

    .btn-primary { background: #2563eb; color: #fff; }
    .btn-danger { background: #ef4444; color: #fff; }

    .summary {
      display: flex;
      gap: 1rem;
      margin: 1rem 0;
      flex-wrap: wrap;
    }

    .card {
      flex: 1 1 150px;
      background: #f9fafb;
      border-radius: 0.75rem;
      padding: 0.75rem 1rem;
      border: 1px solid #e5e7eb;
    }

    .card-title {
      font-size: 0.8rem;
      text-transform: uppercase;
      color: #6b7280;
      margin-bottom: 0.25rem;
    }

    .card-value {
      font-size: 1.1rem;
      font-weight: 600;
    }

    #remainingCard {
      background: #f0fdf4;
      border-color: #86efac;
    }

    table { width: 100%; border-collapse: collapse; margin-top: 0.5rem; }
    th, td { padding: 0.5rem; border-bottom: 1px solid #e5e7eb; }
    th { background: #f3f4f6; font-weight: 600; }
    .right { text-align: right; }

    .category-pill {
      padding: 0.15rem 0.5rem;
      border-radius: 999px;
      background: #e5e7eb;
      font-size: 0.75rem;
    }

    .money-rain {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
      z-index: 9999;
    }

    .money {
      position: absolute;
      font-size: 2rem;
      animation: fall 1.5s linear forwards;
    }

    @keyframes fall {
      from { transform: translateY(-50px) rotate(0deg); opacity: 1; }
      to { transform: translateY(120vh) rotate(360deg); opacity: 0; }
    }
  </style>
</head>
<body>

  <div class="container">

    <h1>Kaylie's Budget</h1>

    <div class="month-title">Month</div>
    <input type="month" id="monthSelect" />

    <div class="summary">
      <div class="card">
        <div class="card-title">Total Income</div>
        <div class="card-value" id="plannedIncome">$0.00</div>
      </div>
      <div class="card">
        <div class="card-title">Total Spent</div>
        <div class="card-value" id="totalSpent">$0.00</div>
      </div>
      <div class="card" id="remainingCard">
        <div class="card-title">Remaining</div>
        <div class="card-value" id="remainingAmount">$0.00</div>
      </div>
    </div>

    <button class="btn-danger" id="clearMonthBtn" style="margin-bottom:1rem;">Clear this month</button>

    <h2 class="section-spaced">Add Income</h2>
    <div class="row">
      <div>
        <label>Name</label>
        <input type="text" id="incomeName" />
      </div>
      <div>
        <label>Amount</label>
        <input type="number" id="incomeAmount" min="0" step="0.01" />
      </div>
      <div>
        <label>&nbsp;</label>
        <button class="btn-primary move-down" id="addIncomeBtn">Add income</button>
      </div>
    </div>

    <h2 class="section-spaced">Add Expense</h2>
    <div class="row">
      <div>
        <label>Name</label>
        <input type="text" id="expenseName" />
      </div>
      <div>
        <label>Category</label>
        <select id="expenseCategory">
          <option value="Food">Food</option>
          <option value="Entertainment">Entertainment</option>
          <option value="Transportation">Transportation</option>
          <option value="Personal Care">Personal Care</option>
          <option value="Other">Other</option>
        </select>
      </div>
      <div>
        <label>Amount</label>
        <input type="number" id="expenseAmount" min="0" step="0.01" />
      </div>
      <div>
        <label>&nbsp;</label>
        <button class="btn-primary move-down" id="addExpenseBtn">Add expense</button>
      </div>
    </div>

    <h2>Income</h2>
    <table>
      <thead>
        <tr>
          <th>Date</th>
          <th>Name</th>
          <th class="right">Amount</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="incomeTableBody"></tbody>
    </table>

    <h2>Expenses</h2>
    <table>
      <thead>
        <tr>
          <th>Date</th>
          <th>Name</th>
          <th>Category</th>
          <th class="right">Amount</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="expenseTableBody"></tbody>
    </table>

  </div>

  <div id="moneyRain" class="money-rain"></div>

  <script type="module" src="app.js"></script>
</body>
</html>
